name: Auto PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff stats
        run: |
          echo "## PR Stats" >> $GITHUB_STEP_SUMMARY
          echo "- Files changed: $(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Lines added: $(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1)" >> $GITHUB_STEP_SUMMARY

      - name: Check for blocked patterns
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)

          # Check for secrets
          if echo "$DIFF" | grep -qiE '(api_key|secret_key|password|token)\s*=\s*["\x27][^"\x27]+'; then
            echo "::error::Potential secret detected in diff"
            exit 1
          fi

          # Check for force push commands
          if echo "$DIFF" | grep -qE 'git\s+push\s+.*--force'; then
            echo "::error::Force push command detected"
            exit 1
          fi

          # Check for rm -rf
          if echo "$DIFF" | grep -qE 'rm\s+-rf\s+/'; then
            echo "::error::Dangerous rm -rf detected"
            exit 1
          fi

          echo "No blocked patterns found"

      - name: Check for large files
        run: |
          LARGE_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | while read f; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f")
              if [ "$SIZE" -gt 1048576 ]; then
                echo "$f ($SIZE bytes)"
              fi
            fi
          done)

          if [ -n "$LARGE_FILES" ]; then
            echo "::warning::Large files detected: $LARGE_FILES"
          fi
